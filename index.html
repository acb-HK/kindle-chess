<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Kindle Chess</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.webmanifest">
</head>
<body>
<h1>Chess</h1>
<nav>
  <a href="index.html" class="on">Pieces</a>
  <a href="emoji.html">Emoji</a>
  <a href="puzzles.html">Puzzles</a>
</nav>

<div class="ctl">
  <label>Mode
    <select id="mode" onchange="onControlChange()">
      <option value="cpu" selected>vs Computer</option>
      <option value="2p">2 Players</option>
    </select>
  </label>
  <label>You
    <select id="side" onchange="onControlChange()">
      <option value="w" selected>White</option>
      <option value="b">Black</option>
    </select>
  </label>
  <label>Level
    <select id="level" onchange="onControlChange()">
      <option value="0">Beginner</option>
      <option value="1">Easy</option>
      <option value="2" selected>Medium</option>
      <option value="3">Hard</option>
    </select>
  </label>
  <label><input type="checkbox" id="flip" checked oninput="G.flip2p=this.checked;render();"> flip each turn (2P)</label>
</div>

<div id="status"></div>
<div id="boardwrap"></div>

<div class="ctl">
  <button onclick="newGame()">New Game</button>
  <button onclick="undo()">Undo</button>
</div>

<div id="moves"></div>
<div class="note">You are White unless you choose Black. Tap a piece, then tap its destination.
  Move list uses board coordinates (e2&rarr;e4, capture e2&times;d3, O-O = castle).</div>

<script src="engine.js"></script>
<script src="svg-pieces.js"></script>
<script>window.PIECE_RENDER = pieceSVG;</script>
<script src="ui.js"></script>
<script>
newGame();
if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('sw.js'); }catch(e){} }
</script>
</body>
</html>
